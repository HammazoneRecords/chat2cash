<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="em" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#020408"/>
  <!-- Top accent bar -->
  <rect x="80" y="44" width="352" height="5" rx="2.5" fill="url(#em)" opacity="0.8"/>
  <!-- Left C — white -->
  <text x="144" y="310"
    font-family="'Courier New', Courier, monospace"
    font-size="196" font-weight="900"
    text-anchor="middle" fill="#ffffff">c</text>
  <!-- 2 — emerald (the converter) -->
  <text x="258" y="310"
    font-family="'Courier New', Courier, monospace"
    font-size="196" font-weight="900"
    text-anchor="middle" fill="url(#em)">2</text>
  <!-- Right C — white -->
  <text x="372" y="310"
    font-family="'Courier New', Courier, monospace"
    font-size="196" font-weight="900"
    text-anchor="middle" fill="#ffffff">c</text>
  <!-- Bottom accent bar -->
  <rect x="130" y="348" width="252" height="5" rx="2.5" fill="url(#em)" opacity="0.6"/>
  <!-- Subtle border ring -->
  <rect width="512" height="512" rx="96" fill="none"
    stroke="#10b981" stroke-width="2" opacity="0.2"/>
</svg>
