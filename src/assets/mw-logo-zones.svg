<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" id="mw-logo">
  <!-- Background -->
  <rect width="400" height="300" fill="#060a13"/>

  <!-- MW Wave shape — two upper peaks (M) + two lower valleys + two upper peaks (W) -->
  <!-- The wave path: start left, rise to L1 peak, dip to V1 valley, rise to L2 peak,
       dip to V2 center valley, rise to R1 peak, dip to V3 valley, rise to R2 peak, down -->
  <path
    d="M 30 220
       C 30 220, 50 80, 80 80
       C 110 80, 120 160, 140 160
       C 160 160, 170 80, 200 80
       C 230 80, 240 220, 260 220
       C 280 220, 290 80, 320 80
       C 350 80, 360 160, 370 220"
    fill="none"
    stroke="url(#mwGradient)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="mwGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Subtle label -->
  <text x="200" y="265" text-anchor="middle" fill="#1e293b" font-family="monospace" font-size="11" letter-spacing="4">MINDWAVE</text>

  <!-- ═══════════════════════════════════════════════════
       INVISIBLE CLICK ZONES — opacity 0, pointer-events all
       Zone IDs map to server-side sequence validation
       Zone layout (L→R): L1, V1, L2, V2, R1, V3, R2
       ═══════════════════════════════════════════════════ -->

  <!-- L1 — left M peak (top-left) -->
  <rect id="zone-L1" x="40" y="60" width="70" height="120" fill="transparent" style="cursor:pointer" data-zone="L1"/>

  <!-- V1 — valley between M peaks -->
  <rect id="zone-V1" x="115" y="120" width="50" height="100" fill="transparent" style="cursor:pointer" data-zone="V1"/>

  <!-- L2 — right M peak -->
  <rect id="zone-L2" x="155" y="60" width="70" height="120" fill="transparent" style="cursor:pointer" data-zone="L2"/>

  <!-- V2 — center valley (between M and W) -->
  <rect id="zone-V2" x="220" y="160" width="50" height="80" fill="transparent" style="cursor:pointer" data-zone="V2"/>

  <!-- R1 — left W peak -->
  <rect id="zone-R1" x="265" y="60" width="55" height="120" fill="transparent" style="cursor:pointer" data-zone="R1"/>

  <!-- V3 — valley between W peaks -->
  <rect id="zone-V3" x="315" y="120" width="30" height="100" fill="transparent" style="cursor:pointer" data-zone="V3"/>

  <!-- R2 — right W peak -->
  <rect id="zone-R2" x="340" y="60" width="40" height="120" fill="transparent" style="cursor:pointer" data-zone="R2"/>
</svg>
